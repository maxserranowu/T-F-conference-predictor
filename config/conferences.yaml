# Conference registry. Every module reads this file; nothing is hard-coded.
# league_id values are the real TFRRS /leagues/{id}.html identifiers.
# team slugs are the real /teams/tf/{slug}.html path fragments.
#
# NOTE ON MEMBERSHIP: TFRRS's /leagues page shows CURRENT members. The ingester
# also reads each historical meet's actual scoring teams, so realignment (e.g.
# California/Stanford/SMU joining the ACC in 2024) is handled from the meet data
# itself — this list is only the seed for team-page crawling.

http:
  user_agent: "ACC-Ivy-Predictor/1.0 (research; contact: you@example.edu)"
  min_interval_seconds: 3.0
  jitter_seconds: 1.5
  cache_dir: ".httpcache"
  max_retries: 4
  timeout_seconds: 30

conferences:
  acc:
    display_name: "ACC"
    league_id: 62
    champ_meet_keywords: ["ACC Outdoor", "ACC Indoor", "ACC Cross Country", "ACC XC"]
    teams:
      - {name: "Boston College",  slug_m: "MA_college_m_Boston_College",     slug_f: "MA_college_f_Boston_College"}
      - {name: "California",      slug_m: "CA_college_m_California_CA",       slug_f: "CA_college_f_California_CA"}
      - {name: "Clemson",         slug_m: "SC_college_m_Clemson",            slug_f: "SC_college_f_Clemson"}
